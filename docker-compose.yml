---
# =============================================================================
# ExpressVPN Docker Gateway — arr-stack
# Replaces gluetun with a native ExpressVPN Lightway connection.
#
# SETUP:
#   1. Copy .env.example to .env and fill in your ACTIVATION_CODE
#   2. docker compose up -d
#
# NOTE: Port forwarding is NOT supported by ExpressVPN's servers.
#       qBittorrent is configured for maximum performance WITHOUT port forwarding:
#         - Peer exchange (PEX) enabled
#         - DHT enabled
#         - Local peer discovery enabled
#         - High connection limits for swarm connectivity
#       See README.md for full qBittorrent performance tuning guide.
# =============================================================================
services:

  # ── ExpressVPN Gateway ──────────────────────────────────────────────────────
  expressvpn:
    build:
      context: .
      args:
        # ⚠️ v3.x certificates expire March 31, 2026. v4+ is REQUIRED.
        APP_VERSION: "4.0.1" # ⚠️ Update when new v4.x releases drop
    image: expressvpn-gateway:latest
    container_name: expressvpn
    privileged: true
    hostname: expressvpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    # ── All arr-stack ports are published HERE (like gluetun) ─────────────────
    ports:
      # qBittorrent
      - "6881:6881" # BitTorrent peer traffic (TCP)
      - "6881:6881/udp" # BitTorrent peer traffic (UDP)
      - "8085:8085" # qBittorrent WebUI
      # Indexers
      - "9117:9117" # Jackett
      - "9696:9696" # Prowlarr
      # Arr suite
      - "8989:8989" # Sonarr
      - "7878:7878" # Radarr
      # Utilities
      - "7777:5055" # Seerr (Overseerr fork)
      - "6868:6868" # Profilarr
      - "8191:8191" # FlareSolverr
      # Health endpoint
      - "8999:8999" # ExpressVPN health — http://localhost:8999/health
    sysctls:
      # Allow forwarding / prevent IPv6 leaks
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.disable_ipv6=1
    environment:
      - ACTIVATION_CODE=${ACTIVATION_CODE}
      - SERVER=${SERVER:-smart}
      - PREFERRED_PROTOCOL=${PREFERRED_PROTOCOL:-lightwayudp}
      - LIGHTWAY_CIPHER=${LIGHTWAY_CIPHER:-auto}
      - FIREWALL_OUTBOUND_SUBNETS=${FIREWALL_OUTBOUND_SUBNETS:-192.168.90.0/24}
      - RECONNECT_DELAY=${RECONNECT_DELAY:-30}
      - HEALTH_PORT=8999
      - TZ=${TZ:-America/New_York}
      # Qt headless — prevents v4 client binary from aborting with no display
      - QT_QPA_PLATFORM=offscreen
      - LANG=C.UTF-8
    volumes:
      - ./releases/expressvpn.run:/data/expressvpn.run:ro
      - expressvpn_data:/data # Persists activation state
    healthcheck:
      test: [ "CMD", "/usr/local/bin/healthcheck.sh" ]
      interval: 30s
      timeout: 10s
      start_period: 120s # Allow ~60s extraction + ~30s daemon startup + ~30s buffer
      retries: 3
    restart: unless-stopped
  # ── qBittorrent ─────────────────────────────────────────────────────────────
  # Port forwarding: ExpressVPN does NOT support it.
  # Maximise throughput with high peer limits + DHT + PEX instead.
  # See README.md → qBittorrent Performance Tuning

volumes:
  expressvpn_data:
