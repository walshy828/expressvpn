---
# =============================================================================
# ExpressVPN Docker Gateway — arr-stack
# Replaces gluetun with a native ExpressVPN Lightway connection.
#
# SETUP:
#   1. Copy .env.example to .env and fill in your ACTIVATION_CODE
#   2. docker compose up -d
#
# NOTE: Port forwarding is NOT supported by ExpressVPN's servers.
#       qBittorrent is configured for maximum performance WITHOUT port forwarding:
#         - Peer exchange (PEX) enabled
#         - DHT enabled
#         - Local peer discovery enabled
#         - High connection limits for swarm connectivity
#       See README.md for full qBittorrent performance tuning guide.
# =============================================================================
services:

  # ── ExpressVPN Gateway ──────────────────────────────────────────────────────
  expressvpn:
    build:
      context: .
      args:
        # ⚠️ v3.x certificates expire March 31, 2026. v4+ is REQUIRED.
        APP_VERSION: "4.0.1" # Update when new v4.x releases are available
    image: expressvpn-gateway:latest
    container_name: expressvpn
    hostname: expressvpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    # ── All arr-stack ports are published HERE (like gluetun) ─────────────────
    ports:
      # qBittorrent
      - "6881:6881" # BitTorrent peer traffic (TCP)
      - "6881:6881/udp" # BitTorrent peer traffic (UDP)
      - "8085:8085" # qBittorrent WebUI
      # Indexers
      - "9117:9117" # Jackett
      - "9696:9696" # Prowlarr
      # Arr suite
      - "8989:8989" # Sonarr
      - "7878:7878" # Radarr
      # Utilities
      - "7777:5055" # Seerr (Overseerr fork)
      - "6868:6868" # Profilarr
      - "8191:8191" # FlareSolverr
      # Health endpoint
      - "8999:8999" # ExpressVPN health — http://localhost:8999/health
    sysctls:
      # Allow forwarding / prevent IPv6 leaks
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.disable_ipv6=1
    environment:
      - ACTIVATION_CODE=${ACTIVATION_CODE}
      - SERVER=${SERVER:-smart}
      - PREFERRED_PROTOCOL=${PREFERRED_PROTOCOL:-lightway_udp}
      - LIGHTWAY_CIPHER=${LIGHTWAY_CIPHER:-auto}
      - FIREWALL_OUTBOUND_SUBNETS=${FIREWALL_OUTBOUND_SUBNETS:-192.168.90.0/24}
      - RECONNECT_DELAY=${RECONNECT_DELAY:-30}
      - HEALTH_PORT=8999
      - TZ=${TZ:-America/New_York}
    volumes:
      - /docker/arr-stack/expressvpn:/data # Persists activation state
    healthcheck:
      test: [ "CMD", "/usr/local/bin/healthcheck.sh" ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  # ── qBittorrent ─────────────────────────────────────────────────────────────
  # Port forwarding: ExpressVPN does NOT support it.
  # Maximise throughput with high peer limits + DHT + PEX instead.
  # See README.md → qBittorrent Performance Tuning
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:expressvpn # Routes all traffic through VPN
    depends_on:
      expressvpn:
        condition: service_healthy
        restart: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/New_York}
      - WEBUI_PORT=8085
    volumes:
      - /docker/arr-stack/qbittorrent:/config
      - /mnt/torrent:/mnt/torrent
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  # ── Jackett ──────────────────────────────────────────────────────────────────
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    network_mode: service:expressvpn
    depends_on:
      expressvpn:
        condition: service_healthy
        restart: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/New_York}
      - AUTO_UPDATE=true
    volumes:
      - /docker/arr-stack/jackett/data:/config
      - /docker/arr-stack/jackett/blackhole:/downloads
    restart: unless-stopped

  # ── Sonarr ───────────────────────────────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    network_mode: service:expressvpn
    depends_on:
      expressvpn:
        condition: service_healthy
        restart: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/New_York}
    volumes:
      - /docker/arr-stack/sonarr/data:/config
      - /mnt/torrent:/mnt/torrent
      - /mnt/nas2:/mnt/nas2
      - /mnt/media:/media
    restart: unless-stopped

  # ── Prowlarr ─────────────────────────────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: service:expressvpn
    depends_on:
      expressvpn:
        condition: service_healthy
        restart: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/New_York}
    volumes:
      - /docker/arr-stack/prowlarr/data:/config
      - /mnt/torrent:/mnt/torrent
    restart: unless-stopped

  # ── FlareSolverr ─────────────────────────────────────────────────────────────
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    network_mode: service:expressvpn
    depends_on:
      expressvpn:
        condition: service_healthy
        restart: true
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=${TZ:-America/New_York}
    restart: unless-stopped

  # ── Radarr ───────────────────────────────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: service:expressvpn
    depends_on:
      expressvpn:
        condition: service_healthy
        restart: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/New_York}
    volumes:
      - /docker/radarr/data:/config
      - /mnt/nas1:/mnt/nas1
      - /mnt/torrent:/mnt/torrent
      - /mnt/nas2:/mnt/nas2
      - /mnt/media:/media
    restart: unless-stopped

  # ── Seerr (Overseerr fork) ───────────────────────────────────────────────────
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    network_mode: service:expressvpn
    depends_on:
      expressvpn:
        condition: service_healthy
        restart: true
    init: true
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-America/New_York}
      - PORT=5055
    volumes:
      - /docker/overseerr/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:5055/api/v1/status || exit 1
      start_period: 60s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped

  # ── Profilarr ────────────────────────────────────────────────────────────────
  profilarr:
    image: santiagosayshey/profilarr:latest
    container_name: profilarr
    network_mode: service:expressvpn
    depends_on:
      expressvpn:
        condition: service_healthy
        restart: true
    volumes:
      - /docker/profilarr/config:/config
    restart: unless-stopped

networks: {}
